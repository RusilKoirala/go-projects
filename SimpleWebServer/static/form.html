<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form method="post" action="/form">
        <label>Name</label><br>
        <input name="name" placeholder="Enter Name" type="text"><br><hr>
        <label>Email</label><br>
        <input name="email" placeholder="Enter Email" type="email"><br><hr>
        <label>Age</label><br>
        <input name="age" placeholder="Enter Age" type="number"><br><hr>
        <label>Address</label><br>
        <input name="address" placeholder="Enter Address" type="text"><br><hr>
        <button type="submit" value="submit">Submit</button>
    </form>
</body>
</html>
